name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - madoka

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint Python sources
        run: |
          ruff check .

      - name: Syntax check
        run: |
          python -m compileall -q .

      - name: Component trees in sync
        run: |
          # esphome_components/madoka (type:local install) and
          # esphome/components/madoka (github:// external_components install) must
          # stay byte-identical, or a fix lands in one tree and silently misses
          # the other depending on how a user installs the component.
          diff -rq esphome_components/madoka esphome/components/madoka
